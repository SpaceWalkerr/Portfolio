<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#667eea" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#764ba2" stroke-width="1"/>
    <circle cx="300" cy="315" r="100" fill="none" stroke="#667eea" stroke-width="1"/>
    <circle cx="900" cy="315" r="150" fill="none" stroke="#764ba2" stroke-width="1"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#667eea" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="#764ba2" opacity="0.1"/>
  
  <!-- Content -->
  <g>
    <!-- Name -->
    <text x="600" y="280" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="72" 
          font-weight="700" 
          fill="white" 
          text-anchor="middle">Suraj Nandan</text>
    
    <!-- Accent Line -->
    <rect x="400" y="310" width="400" height="4" fill="url(#accentGrad)" rx="2"/>
    
    <!-- Subtitle -->
    <text x="600" y="370" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="32" 
          font-weight="400" 
          fill="#94a3b8" 
          text-anchor="middle">Software Developer & Engineer</text>
    
    <!-- Badge/Tag -->
    <rect x="500" y="420" width="200" height="50" fill="#667eea" rx="25" opacity="0.2"/>
    <text x="600" y="452" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="20" 
          font-weight="600" 
          fill="#667eea" 
          text-anchor="middle">Portfolio</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="350" cy="450" r="3" fill="#667eea"/>
  <circle cx="370" cy="450" r="3" fill="#667eea" opacity="0.7"/>
  <circle cx="390" cy="450" r="3" fill="#667eea" opacity="0.4"/>
  <circle cx="810" cy="450" r="3" fill="#764ba2" opacity="0.4"/>
  <circle cx="830" cy="450" r="3" fill="#764ba2" opacity="0.7"/>
  <circle cx="850" cy="450" r="3" fill="#764ba2"/>
</svg>
